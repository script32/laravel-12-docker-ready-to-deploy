# =============================================================================
# default.conf — Nginx optimizado para Producción
# Laravel 12 Docker Ready-to-Deploy Starter Kit
#
# OPTIMIZACIONES CLAVE:
#   - Compresión Gzip activa para reducir el ancho de banda hasta un 70 % en
#     respuestas de texto (HTML, JS, CSS, JSON).
#   - Cache de assets estáticos con 'expires' extenso y headers inmutables,
#     reduciendo peticiones redundantes al servidor.
#   - Encabezados de seguridad HTTP (X-Frame-Options, X-Content-Type-Options,
#     Referrer-Policy, Permissions-Policy) sin necesidad de middleware PHP.
#   - 'try_files' para Laravel: toda petición no resuelta como archivo estático
#     es reenviada a index.php sin exponer rutas internas del sistema.
#   - 'fastcgi_hide_header X-Powered-By' oculta la versión de PHP al cliente.
#   - Timeouts de FastCGI ajustados para evitar 502 en procesos PHP lentos.
#   - Acceso bloqueado a archivos sensibles (.env, .git, composer.json, etc.).
# =============================================================================

# ---------------------------------------------------------------------------
# Bloque de configuración global de Gzip
# Se define aquí para que aplique a todos los bloques 'server' del archivo.
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;               # Agrega 'Vary: Accept-Encoding' para proxies y CDNs
gzip_proxied any;           # Comprime también respuestas de proxies upstream
gzip_comp_level 6;          # Nivel 6: balance óptimo entre compresión y CPU
gzip_min_length 1024;       # No comprimir respuestas menores a 1 KB (overhead > ganancia)
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

server {
    listen 80;
    listen [::]:80;           # IPv6

    # En producción, reemplazar por el dominio real.
    # Nginx rechaza peticiones con Host header no declarado (evita 'default server' exploits).
    server_name _;

    root /var/www/html/public;
    index index.php;

    # ---------------------------------------------------------------------------
    # LÍMITES Y TIMEOUTS
    # Previenen ataques de tipo Slowloris y uploads no autorizados de archivos grandes.
    # ---------------------------------------------------------------------------
    client_max_body_size 100M;      # Ajustar según el máximo de uploads permitido
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # ---------------------------------------------------------------------------
    # ENCABEZADOS DE SEGURIDAD HTTP
    # Aplicados globalmente a todas las respuestas de este server block.
    # ---------------------------------------------------------------------------

    # Previene que la página sea cargada en un iframe (Clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Deshabilita el MIME-sniffing del navegador (MIME type confusion attacks)
    add_header X-Content-Type-Options "nosniff" always;

    # Controla qué información de referencia se envía en peticiones cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deshabilita APIs del navegador innecesarias para reducir superficie de ataque
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy básica — PERSONALIZAR según los recursos externos usados
    # Comentada por defecto para no romper integraciones (CDNs, analytics, etc.)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # ---------------------------------------------------------------------------
    # BLOQUEO DE ARCHIVOS SENSIBLES
    # Retorna 404 en lugar de 403 para no revelar la existencia de los archivos.
    # ---------------------------------------------------------------------------
    location ~ /\. {
        # Bloquea acceso a cualquier archivo/directorio que empiece con punto
        # (.env, .git, .htaccess, .DS_Store, etc.)
        deny all;
        return 404;
    }

    location ~* \.(env|log|sql|bak|sh|json|lock|md|yaml|yml|xml)$ {
        # Bloquea acceso directo a archivos de configuración y metadatos del proyecto
        deny all;
        return 404;
    }

    # ---------------------------------------------------------------------------
    # ASSETS ESTÁTICOS — Cache agresivo del lado del cliente
    # Los assets de Vite incluyen hash en el nombre (app.a1b2c3d4.js), por lo que
    # es seguro cachear indefinidamente con 'immutable'.
    # ---------------------------------------------------------------------------
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|webp|avif|svg|woff|woff2|ttf|eot|otf|mp4|webm|ogg|mp3|pdf|zip)$ {
        expires 1y;
        access_log off;             # Sin logs para assets estáticos — reduce I/O de disco
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Mantener encabezados de seguridad también en assets
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # RUTA PRINCIPAL DE LARAVEL
    # Toda petición que no corresponda a un archivo o directorio real en public/
    # se reenvía a index.php. Este es el núcleo del "Front Controller" de Laravel.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------------------------------------------------------
    # PROCESAMIENTO PHP via FastCGI
    # Se comunica con PHP-FPM a través del socket TCP interno del contenedor 'app'.
    # ---------------------------------------------------------------------------
    location ~ \.php$ {
        # Previene el PHP PATH_INFO exploit (Nginx + PHP-FPM vulnerability)
        # Solo procesa el archivo exacto solicitado como PHP.
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 'app' es el nombre del servicio en docker-compose.yml.
        # En producción con docker stack/k8s, usar el nombre del servicio/pod.
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        # Incluye los parámetros FastCGI estándar de Nginx
        include fastcgi_params;

        # Parámetros críticos para PHP-FPM
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # OPTIMIZACIÓN: oculta la versión de PHP en las respuestas HTTP
        fastcgi_hide_header X-Powered-By;

        # Timeouts de FastCGI ajustados para procesos PHP de larga duración
        # (imports masivos, generación de reportes, etc.)
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
        fastcgi_connect_timeout 10s;

        # Buffer sizes para reducir operaciones de disco en respuestas PHP
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ---------------------------------------------------------------------------
    # HEALTH CHECK ENDPOINT
    # Permite que load balancers y orquestadores (ECS, K8s) verifiquen
    # que el contenedor está vivo sin invocar el stack completo de Laravel.
    # ---------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ---------------------------------------------------------------------------
    # LOGS
    # En contenedores Docker, se redirige a stdout/stderr para que el
    # daemon de Docker capture los logs y los envíe al log driver configurado.
    # ---------------------------------------------------------------------------
    access_log /dev/stdout;
    error_log /dev/stderr warn;
}
